<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 1024 1024">
  <defs>
    <!-- Multi-stop base — avoids banding when rasterized -->
    <radialGradient id="base" cx="36%" cy="30%" r="68%" fx="32%" fy="26%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="18%" stop-color="#FAFAF8"/>
      <stop offset="38%" stop-color="#ECE9E4"/>
      <stop offset="58%" stop-color="#D4CFC8"/>
      <stop offset="78%" stop-color="#B0AAA2"/>
      <stop offset="92%" stop-color="#8F8880"/>
      <stop offset="100%" stop-color="#6B6560"/>
    </radialGradient>

    <!-- Cool rim falloff -->
    <radialGradient id="rim" cx="50%" cy="54%" r="52%">
      <stop offset="72%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.18"/>
    </radialGradient>

    <!-- Soft specular — gradient only, no pasted ellipse -->
    <radialGradient id="spec" cx="34%" cy="26%" r="28%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#FFFFFF" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <clipPath id="ball">
      <circle cx="512" cy="512" r="400"/>
    </clipPath>
  </defs>

  <circle cx="512" cy="512" r="400" fill="url(#base)"/>
  <circle cx="512" cy="512" r="400" fill="url(#rim)"/>
  <circle cx="512" cy="512" r="400" fill="url(#spec)"/>

  <!-- Network mark -->
  <g clip-path="url(#ball)" fill="none" stroke="#141414" stroke-linecap="round" stroke-linejoin="round">
    <g stroke-width="13">
      <path d="M 268 438 L 404 438 L 512 522 L 656 412 L 776 452"/>
      <path d="M 308 598 L 436 536 L 512 628 L 644 558 L 756 608"/>
      <path d="M 360 364 L 436 438 L 512 384 L 588 456"/>
      <path d="M 384 692 L 512 628 L 600 704"/>
    </g>
    <g stroke-width="8.5" opacity="0.88">
      <path d="M 404 438 L 404 536 L 436 536"/>
      <path d="M 512 522 L 512 628 L 644 558"/>
      <path d="M 436 438 L 436 364 L 512 384"/>
      <path d="M 656 412 L 656 558 L 644 558"/>
      <path d="M 308 598 L 308 504 L 404 438"/>
      <path d="M 776 452 L 756 608"/>
      <path d="M 512 384 L 588 456 L 656 412"/>
      <path d="M 384 692 L 308 598"/>
    </g>
    <g fill="#141414" stroke="none">
      <circle cx="268" cy="438" r="17"/>
      <circle cx="404" cy="438" r="21"/>
      <circle cx="512" cy="522" r="24"/>
      <circle cx="656" cy="412" r="19"/>
      <circle cx="776" cy="452" r="15"/>
      <circle cx="308" cy="598" r="17"/>
      <circle cx="436" cy="536" r="15"/>
      <circle cx="512" cy="628" r="19"/>
      <circle cx="644" cy="558" r="17"/>
      <circle cx="756" cy="608" r="15"/>
      <circle cx="360" cy="364" r="13"/>
      <circle cx="512" cy="384" r="15"/>
      <circle cx="588" cy="456" r="11"/>
      <circle cx="384" cy="692" r="13"/>
      <circle cx="600" cy="704" r="11"/>
    </g>
  </g>
</svg>
