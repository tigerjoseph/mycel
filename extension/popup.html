<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 13px/1.4 system-ui, -apple-system, sans-serif;
        margin: 0;
        padding: 16px;
        width: 260px;
        color: #1a1a1a;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 8px;
      }
      p {
        margin: 0 0 12px;
        color: #666;
      }
      .status {
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 12px;
        margin-bottom: 12px;
      }
      .ok {
        background: #e8f5e9;
        color: #1b5e20;
      }
      .err {
        background: #ffebee;
        color: #b71c1c;
      }
      button {
        width: 100%;
        padding: 8px 12px;
        border: none;
        border-radius: 8px;
        background: #1a1a1a;
        color: #fff;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h1>Mycel Saver</h1>
    <p>Hover Instagram posts and click <strong>+ Mycel</strong>. Or press ⌘⇧S on any page.</p>
    <div id="status" class="status err">Checking connection…</div>
    <button id="save">Save this tab</button>
    <script src="popup.js"></script>
  </body>
</html>
